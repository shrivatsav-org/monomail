name: Build & Release

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      # --------------------------------------------------------------------------
      # Config files from secrets
      # --------------------------------------------------------------------------

      - name: Decode keystore
        run: |
          mkdir -p app
          echo "${{ secrets.KEYSTORE_FILE_BASE64 }}" | base64 -d > app/monomail-release.keystore

      - name: Create keystore.properties
        run: |
          cat > keystore.properties << EOF
          storeFile=app/monomail-release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Create secrets.properties
        run: |
          cat > secrets.properties << EOF
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          PUSH_BACKEND_URL=${{ secrets.PUSH_BACKEND_URL }}
          EOF

      - name: Decode google-services.json
        run: |
          mkdir -p app/src/playstore
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/src/playstore/google-services.json

      # --------------------------------------------------------------------------
      # Version bump
      # --------------------------------------------------------------------------

      - name: Bump version
        id: version
        run: |
          VERSION=$(grep 'versionName = "' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          VCODE=$(grep 'versionCode = ' app/build.gradle.kts | sed 's/.*versionCode = \([0-9]*\).*/\1/')

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          PATCH=$((PATCH + 1))

          if [ "$PATCH" -ge 100 ]; then
            PATCH=0
            MINOR=$((MINOR + 1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          NEW_VCODE=$((VCODE + 1))

          sed -i "s/versionCode = $VCODE/versionCode = $NEW_VCODE/" app/build.gradle.kts
          sed -i "s/versionName = \"$VERSION\"/versionName = \"$NEW_VERSION\"/" app/build.gradle.kts

          echo "OLD_VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "VCODE=$NEW_VCODE" >> $GITHUB_OUTPUT

      # --------------------------------------------------------------------------
      # Commit & Tag
      # --------------------------------------------------------------------------

      - name: Commit, tag, and push
        id: committag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
          echo "PREV_TAG=$PREV_TAG" >> $GITHUB_OUTPUT

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add app/build.gradle.kts
          git commit -m "chore: bump version to ${{ steps.version.outputs.VERSION }} [skip ci]"

          git tag "v${{ steps.version.outputs.VERSION }}"

          git push
          git push --tags

      # --------------------------------------------------------------------------
      # Install OpenCode
      # --------------------------------------------------------------------------

      - name: Install OpenCode
        run: npm install -g opencode-ai

      - name: Verify OpenCode
        run: |
          opencode --version
          opencode run --help

      # --------------------------------------------------------------------------
      # Gather commits since previous tag
      # --------------------------------------------------------------------------

      - name: Gather commits since previous tag
        run: |
          PREV_TAG="${{ steps.committag.outputs.PREV_TAG }}"

          if [ -n "$PREV_TAG" ]; then
            RANGE="$PREV_TAG..HEAD"
          else
            RANGE="HEAD"
          fi

          echo "Using range: $RANGE"

          git log "$RANGE" \
            --pretty=format:'%s' \
            --no-merges \
            --invert-grep \
            --grep='^chore: bump version' \
            > commit_log.txt

          if [ ! -s commit_log.txt ]; then
            echo "No user-facing changes." > commit_log.txt
          fi

          echo "===== COMMITS ====="
          cat commit_log.txt

      # --------------------------------------------------------------------------
      # Generate Release Notes
      # --------------------------------------------------------------------------

      - name: Generate release notes
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          PROMPT=$(cat <<'EOF'
          Write concise, user-facing GitHub release notes.

          Group changes under:
          - Features
          - Bug Fixes
          - Maintenance

          Omit any empty section.

          Use ONLY the commits below.
          Don't invent features.
          Output Markdown only.

          Commits:
          EOF
          )

          PROMPT="$PROMPT

          $(cat commit_log.txt)"

          opencode run "$PROMPT" \
            --model opencode/mimo-v2.5-free \
            --print-logs \
            | tee release_notes.md

      - name: Fallback release notes
        run: |
          if [ ! -s release_notes.md ]; then
            cat > release_notes.md <<EOF
          ## What's Changed

          $(sed 's/^/- /' commit_log.txt)
          EOF
          fi

      - name: Print release notes
        run: |
          echo "===== RELEASE NOTES ====="
          cat release_notes.md

      # --------------------------------------------------------------------------
      # Build
      # --------------------------------------------------------------------------

      - name: Build GitHub APK
        run: ./gradlew assembleGithubRelease

      - name: Build Play Store AAB
        run: ./gradlew bundlePlaystoreRelease

      # --------------------------------------------------------------------------
      # Draft GitHub Release
      # --------------------------------------------------------------------------

      - name: Rename APK and create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp app/build/outputs/apk/github/release/app-github-release.apk \
             "Github-release-v${{ steps.version.outputs.VERSION }}.apk"

          gh release create \
            "v${{ steps.version.outputs.VERSION }}" \
            "Github-release-v${{ steps.version.outputs.VERSION }}.apk" \
            "app/build/outputs/bundle/playstoreRelease/app-playstore-release.aab" \
            --draft \
            --notes-file release_notes.md
