name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      # --- Config files from secrets -------------------------------------------
      - name: Decode keystore
        run: |
          mkdir -p app
          echo "${{ secrets.KEYSTORE_FILE_BASE64 }}" | base64 -d > app/monomail-release.keystore

      - name: Create keystore.properties
        run: |
          cat > keystore.properties << EOF
          storeFile=app/monomail-release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Create secrets.properties
        run: |
          cat > secrets.properties << EOF
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          PUSH_BACKEND_URL=${{ secrets.PUSH_BACKEND_URL }}
          EOF

      - name: Decode google-services.json
        run: |
          mkdir -p app/src/playstore
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/src/playstore/google-services.json

      # --- Version bump --------------------------------------------------------
      - name: Bump version
        id: version
        run: |
          VERSION=$(grep 'versionName = "' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          VCODE=$(grep 'versionCode = ' app/build.gradle.kts | sed 's/.*versionCode = \([0-9]*\).*/\1/')

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))
          if [ "$PATCH" -ge 100 ]; then
            PATCH=0
            MINOR=$((MINOR + 1))
          fi
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          NEW_VCODE=$((VCODE + 1))

          sed -i "s/versionCode = $VCODE/versionCode = $NEW_VCODE/" app/build.gradle.kts
          sed -i "s/versionName = \"$VERSION\"/versionName = \"$NEW_VERSION\"/" app/build.gradle.kts

          echo "OLD_VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "VCODE=$NEW_VCODE" >> $GITHUB_OUTPUT

      # --- Build (before push — if build fails, version bump stays local) ------
      - name: Build GitHub APK
        run: ./gradlew assembleGithubRelease

      - name: Build Play Store AAB
        run: ./gradlew bundlePlaystoreRelease

      # --- Commit, tag, push, release -------------------------------------------
      - name: Commit, tag, and release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          git commit -m "chore: bump version to ${{ steps.version.outputs.VERSION }} [skip ci]"

          git tag "v${{ steps.version.outputs.VERSION }}"
          git push
          git push --tags

          # Rename and release
          cp app/build/outputs/apk/github/release/app-github-release.apk \
             "Github-release-v${{ steps.version.outputs.VERSION }}.apk"

          gh release create "v${{ steps.version.outputs.VERSION }}" \
            "Github-release-v${{ steps.version.outputs.VERSION }}.apk" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- AAB for Play Console (manual upload) --------------------------------
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: playstore-aab-v${{ steps.version.outputs.VERSION }}
          path: app/build/outputs/bundle/playstoreRelease/app-playstore-release.aab
