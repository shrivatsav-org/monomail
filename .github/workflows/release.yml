name: Build & Release

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      # --------------------------------------------------------------------------
      # Config files from secrets
      # --------------------------------------------------------------------------

      - name: Decode keystore
        run: |
          mkdir -p app
          echo "${{ secrets.KEYSTORE_FILE_BASE64 }}" | base64 -d > app/monomail-release.keystore

      - name: Create keystore.properties
        run: |
          cat > keystore.properties << EOF
          storeFile=app/monomail-release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Create secrets.properties
        run: |
          cat > secrets.properties << EOF
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          PUSH_BACKEND_URL=${{ secrets.PUSH_BACKEND_URL }}
          EOF

      - name: Decode google-services.json
        run: |
          mkdir -p app/src/playstore
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/src/playstore/google-services.json

      # --------------------------------------------------------------------------
      # Check for existing draft release
      # --------------------------------------------------------------------------

      - name: Check for existing draft
        id: draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DRAFTS=$(gh release list --json tagName,isDraft --jq '[.[] | select(.isDraft)]')
          DRAFT_COUNT=$(echo "$DRAFTS" | jq 'length')

          if [ "$DRAFT_COUNT" -gt 0 ]; then
            # Pick the draft with the highest semver tag
            TAG=$(echo "$DRAFTS" | jq -r \
              'sort_by(.tagName | ltrimstr("v") | split(".") | map(tonumber)) | last | .tagName')
            VERSION="${TAG#v}"
            echo "FOUND=true" >> $GITHUB_OUTPUT
            echo "TAG=$TAG" >> $GITHUB_OUTPUT
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

            if [ "$DRAFT_COUNT" -gt 1 ]; then
              echo "::warning::$DRAFT_COUNT draft releases found. Using latest: $TAG. Delete stale drafts manually."
            fi
            echo "Using existing draft: $TAG"
          else
            echo "FOUND=false" >> $GITHUB_OUTPUT
            echo "No existing draft found"
          fi

      # --------------------------------------------------------------------------
      # Version bump (only if no existing draft)
      # --------------------------------------------------------------------------

      - name: Bump version
        id: version
        if: steps.draft.outputs.FOUND == 'false'
        run: |
          VERSION=$(grep 'versionName = "' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          VCODE=$(grep 'versionCode = ' app/build.gradle.kts | sed 's/.*versionCode = \([0-9]*\).*/\1/')

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          PATCH=$((PATCH + 1))

          if [ "$PATCH" -ge 100 ]; then
            PATCH=0
            MINOR=$((MINOR + 1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          NEW_VCODE=$((VCODE + 1))

          sed -i "s/versionCode = $VCODE/versionCode = $NEW_VCODE/" app/build.gradle.kts
          sed -i "s/versionName = \"$VERSION\"/versionName = \"$NEW_VERSION\"/" app/build.gradle.kts

          echo "OLD_VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "VCODE=$NEW_VCODE" >> $GITHUB_OUTPUT

      # --------------------------------------------------------------------------
      # Commit & Tag (only if new version)
      # --------------------------------------------------------------------------

      - name: Commit, tag, and push
        if: steps.draft.outputs.FOUND == 'false'
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
          echo "PREV_TAG=$PREV_TAG" >> $GITHUB_OUTPUT

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add app/build.gradle.kts
          git commit -m "chore: bump version to ${{ steps.version.outputs.VERSION }} [skip ci]"

          git tag "v${{ steps.version.outputs.VERSION }}"

          git push
          git push --tags

      # --------------------------------------------------------------------------
      # Install OpenCode
      # --------------------------------------------------------------------------

      - name: Install OpenCode
        run: npm install -g opencode-ai

      - name: Verify OpenCode
        run: |
          opencode --version
          opencode run --help

      # --------------------------------------------------------------------------
      # Resolve version and tag for this run
      # --------------------------------------------------------------------------

      - name: Resolve version
        id: resolved
        run: |
          if [ "${{ steps.draft.outputs.FOUND }}" = "true" ]; then
            echo "VERSION=${{ steps.draft.outputs.VERSION }}" >> $GITHUB_OUTPUT
            echo "TAG=${{ steps.draft.outputs.TAG }}" >> $GITHUB_OUTPUT
            # Find the tag before the draft's tag (the last released version)
            PREV_TAG=$(git describe --tags --abbrev=0 "${{ steps.draft.outputs.TAG }}"^ 2>/dev/null || true)
            echo "PREV_TAG=$PREV_TAG" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${{ steps.version.outputs.VERSION }}" >> $GITHUB_OUTPUT
            echo "TAG=v${{ steps.version.outputs.VERSION }}" >> $GITHUB_OUTPUT
            PREV_TAG="v${{ steps.version.outputs.OLD_VERSION }}"
            echo "PREV_TAG=$PREV_TAG" >> $GITHUB_OUTPUT
          fi

      # --------------------------------------------------------------------------
      # Gather commits since previous tag
      # --------------------------------------------------------------------------

      - name: Gather commits since previous tag
        run: |
          PREV_TAG="${{ steps.resolved.outputs.PREV_TAG }}"

          if [ -n "$PREV_TAG" ]; then
            RANGE="$PREV_TAG..HEAD"
          else
            RANGE="HEAD"
          fi

          echo "Using range: $RANGE"

          git log "$RANGE" \
            --pretty=format:'%s' \
            --no-merges \
            --invert-grep \
            --grep='^chore: bump version' \
            > commit_log.txt

          if [ ! -s commit_log.txt ]; then
            echo "No user-facing changes." > commit_log.txt
          fi

          echo "===== COMMITS ====="
          cat commit_log.txt

      # --------------------------------------------------------------------------
      # Generate Release Notes
      # --------------------------------------------------------------------------

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          PROMPT=$(cat <<'EOF'
          Write two outputs separated by the delimiter "===PLAYSTORE===".

          Output 1 — Full GitHub release notes:
          Concise, user-facing Markdown. Group under:
          - Features
          - Bug Fixes
          - Maintenance
          Omit any empty section. Don't invent features.

          Output 2 — Play Store short description (plain text, NO markdown):
          - max 500 characters
          - one or two sentences
          - bullet-style or prose, no headers or formatting
          - highlight the most user-visible change only

          Use ONLY the commits below. Use the previous release notes for tone and continuity.
          EOF
          )

          if [ -n "$PR_TITLE" ]; then
            PROMPT="$PROMPT

          PR Title: $PR_TITLE"
            if [ -n "$PR_BODY" ]; then
              PROMPT="$PROMPT

          PR Description:
          $PR_BODY"
            fi
          else
            # workflow_dispatch — fetch latest merged PR for context
            LATEST_PR=$(gh pr list --state merged --limit 1 --json title,body --jq '.[0]' 2>/dev/null || true)
            if [ -n "$LATEST_PR" ]; then
              PR_TITLE_FETCHED=$(echo "$LATEST_PR" | jq -r '.title')
              PR_BODY_FETCHED=$(echo "$LATEST_PR" | jq -r '.body // ""')
              PROMPT="$PROMPT

          PR Title: $PR_TITLE_FETCHED"
              if [ -n "$PR_BODY_FETCHED" ]; then
                PROMPT="$PROMPT

          PR Description:
          $PR_BODY_FETCHED"
              fi
            fi
          fi

          # Include previous release notes for continuity
          PREV_NOTES=$(gh release view "${{ steps.resolved.outputs.PREV_TAG }}" --json body --jq '.body' 2>/dev/null || echo "")
          if [ -n "$PREV_NOTES" ]; then
            PROMPT="$PROMPT

          Previous Release Notes:
          $PREV_NOTES"
          fi

          PROMPT="$PROMPT

          Commits:

          $(cat commit_log.txt)"

          mkdir -p distribution/whatsnew

          opencode run "$PROMPT" \
            --model opencode/mimo-v2.5-free \
            --print-logs \
            | tee combined_notes.md

          # Split on delimiter into full (github) and short (play store)
          if grep -q '===PLAYSTORE===' combined_notes.md 2>/dev/null; then
            csplit -s combined_notes.md '/===PLAYSTORE===/' 2>/dev/null
            head -n -1 xx00 > release_notes.md 2>/dev/null
            tail -n +2 xx01 > distribution/whatsnew/whatsnew-en-GB 2>/dev/null
            rm -f xx00 xx01 combined_notes.md
          else
            # Fallback: use entire output as full notes
            mv combined_notes.md release_notes.md
          fi

      - name: Fallback full release notes
        run: |
          if [ ! -s release_notes.md ]; then
            cat > release_notes.md <<EOF
          ## What's Changed

          $(sed 's/^/- /' commit_log.txt)
          EOF
          fi

      - name: Print release notes
        run: |
          echo "===== RELEASE NOTES ====="
          cat release_notes.md

      - name: Prepare Play Store release notes
        run: |
          mkdir -p distribution/whatsnew
          if [ ! -f distribution/whatsnew/whatsnew-en-GB ] || [ ! -s distribution/whatsnew/whatsnew-en-GB ]; then
            # Fallback: strip markdown and truncate
            PLAIN=$(sed 's/^##.*//; s/^[-*] //; s/\*\*//g; s/\n\+/\n/g' release_notes.md \
              | sed '/^$/d' | tr '\n' ' ' | sed 's/  */ /g; s/^ //; s/ $//')
            # Truncate at last word boundary under 500 chars
            TRUNC=$(echo "$PLAIN" | head -c 497 | sed 's/ [^ ]*$//')
            printf '%s' "$TRUNC" > distribution/whatsnew/whatsnew-en-GB
          fi
          # Enforce 500-char cap on whatever we have
          SHORT=$(cat distribution/whatsnew/whatsnew-en-GB | head -c 497 | sed 's/ [^ ]*$//' | xargs)
          printf '%s' "$SHORT" > distribution/whatsnew/whatsnew-en-GB
          echo "===== PLAY STORE NOTES (${#SHORT} chars) ====="
          cat distribution/whatsnew/whatsnew-en-GB

      # --------------------------------------------------------------------------
      # Build
      # --------------------------------------------------------------------------

      - name: Build GitHub APK
        run: ./gradlew assembleGithubRelease

      - name: Build Play Store AAB
        run: ./gradlew bundlePlaystoreRelease

      # --------------------------------------------------------------------------
      # Upload AAB to Play Store
      # --------------------------------------------------------------------------

      - name: Upload AAB to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.shrivatsav.monomail
          releaseFiles: app/build/outputs/bundle/playstoreRelease/app-playstore-release.aab
          track: alpha
          whatsNewDirectory: distribution/whatsnew
          releaseStatus: draft

      # --------------------------------------------------------------------------
      # Upload APK to GitHub Release
      # --------------------------------------------------------------------------

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp app/build/outputs/apk/github/release/app-github-release.apk \
             "Github-release-v${{ steps.resolved.outputs.VERSION }}.apk"

          if [ "${{ steps.draft.outputs.FOUND }}" = "true" ]; then
            gh release upload \
              "${{ steps.resolved.outputs.TAG }}" \
              "Github-release-v${{ steps.resolved.outputs.VERSION }}.apk" \
              --clobber
          else
            gh release create \
              "${{ steps.resolved.outputs.TAG }}" \
              "Github-release-v${{ steps.resolved.outputs.VERSION }}.apk" \
              --draft \
              --title "${{ steps.resolved.outputs.TAG }}" \
              --notes-file release_notes.md
          fi
