name: Feature Request
description: Suggest an idea for Monomail
title: "[Feature]: "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting! Check existing issues first — your idea may already be proposed.

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
      placeholder: "I'm always frustrated when..."
    validations:
      required: false

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: What do you want to happen?
      placeholder: "I'd like to see..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternative solutions
      description: What alternatives have you considered?
      placeholder: "A workaround could be..."
    validations:
      required: false

  - type: dropdown
    id: provider
    attributes:
      label: Email Provider
      description: Which provider is this relevant to?
      options:
        - All
        - Gmail
        - Outlook
        - IMAP
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any screenshots, mockups, or references here.
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmations
      options:
        - label: I have searched existing issues — this is not a duplicate
          required: true
